# personal schema patch over rime_mint_flypy.schema.yaml
# user layer file never overwritten by update-upstream.sh
patch:
  # candidate count schema level overrides the global default
  menu/page_size: 8

  # examples uncomment to enable
  #
  # default to traditional chinese
  # switches/@4/reset: 1
  #
  # disable emoji suggestion by default or toggle with Ctrl+Shift+E
  # switches/@1/reset: 0
  #
  # fuzzy pinyin z zh c ch s sh
  # speller/algebra/+:
  #   - derive/^([zcs])h/$1/
  #   - derive/^([zcs])([^h])/$1h$2/
