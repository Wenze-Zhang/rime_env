# 个人方案级定制 —— 以 patch 方式覆写 rime_mint_flypy.schema.yaml
# 此文件属于「用户层」，update-upstream.sh 永远不会覆盖它
patch:
  # 候选词个数（方案文件里写死了 6，方案级会覆盖 default.yaml，所以必须在这里改）
  menu/page_size: 8

  # 常用定制示例（取消注释即可启用）：
  #
  # 默认开启繁体（switches 的顺序见 schema 文件）：
  # switches/@4/reset: 1
  #
  # 关闭 emoji 候选（也可用 Ctrl+Shift+E 临时切换）：
  # switches/@1/reset: 0
  #
  # 增加模糊音 z=zh c=ch s=sh（追加到拼写规则）：
  # speller/algebra/+:
  #   - derive/^([zcs])h/$1/
  #   - derive/^([zcs])([^h])/$1h$2/
