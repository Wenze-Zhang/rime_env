    - derive/ong$/on/ # lon to long
    - derive/([tl])eng$/$1en/ # ten to teng
    - derive/([qwrtypsdfghjklzxcbnm])([aeio])ng$/$1ng/ # lng to lang leng ling long
    # double pinyin mapping
    #- derive/^([jqxy])u$/$1v/
    #- derive/^([aoe])([ioun])$/$1$1$2/
    #- derive/^([aoe])(ng)?$/$1$1$2/
    #- derive/iu$/Ⓠ/
