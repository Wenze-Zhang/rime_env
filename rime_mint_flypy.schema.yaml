radical_reverse_lookup:
  tag: radical_lookup
  dictionary: radical_pinyin
  enable_completion: false
  enable_sentence: false
  prefix: "Uu"
  suffix: " '"
  comment_format:
    - xform/([nljqxy])v/$1ü/
  tips: 〔拆字〕

reverse_lookup:
  tags: [radical_lookup]
  overwrite_comment: true
  dictionary: rime_mint

punctuator:
  import_preset: symbols
  # define some half width characters
  half_shape:
      "#": "#"
      "*": "*"
      '.' : { commit: 。 }
      "`": "`"
      "~": "~"
      "@": "@"
      "=": "="
      "/": ["/", "÷",]
      '\': "、"
      "_" : "──"
      "'": {pair: ["「", "」"]}
      "[": ["【", "["]
      "]": ["】", "]"]
      "$": ["¥", "$", "€", "£", "¢", "¤"]
      "<": ["《", "〈", "«", "<"]
      ">": ["》", "〉", "»", ">"]

unicode:
  tag: unicode
  prefix: "Uc"
  tips: 〔Unicode〕

recognizer:
  import_preset: default
  patterns:
    unicode: "^Uc[a-z]*'?$"
    url: "^[a-z]+[.].+$"
    punct: "^/([0-9]0?|[a-zA-Z]+)$"
    radical_lookup: "Uu[a-z]*'?$"
    rmb: "^R[0-9]+[.]?[0-9]*"        # number translator second char is trigger prefix
    expression: "^=.*$"              # expression translator second char is trigger prefix
    gregorian_to_lunar: "^N[0-9]{1,8}"  # gregorian to lunar like N20240115
    uppercase: ""  # allow digits after uppercase input


key_binder:
  import_preset: default
  # prefix key for shijian lua features
  shijian_keys: ["o"]
  bindings:
    - {accept: "Control+Shift+E", toggle: emoji_suggestion, when: always}   # emoji hotkey
    - {accept: "Control+Shift+1", toggle: transcription, when: has_menu}           # toggle traditional when menu open
    - {accept: "Control+Shift+exclam", toggle: transcription, when: has_menu}      # toggle traditional when menu open weasel variant


menu:
  # candidate count
  page_size: 6


