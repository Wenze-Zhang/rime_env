# Rime schema
# encoding utf-8

schema:
  schema_id: rime_mint_flypy
  name: 薄荷拼音-小鹤混输
  version: "24.11.11"
  author:
    - mintimate < @Mintimate|https://www.mintimate.cn >
  description: |
    Mintimate的薄荷拼音（小鹤双拼混输）方案。
    除了参考官方明月拼音，还参考：
      * chenhe: https://chenhe.me
      * rime wiki: https://github.com/rime/home/wiki
      * rime ice: https://github.com/iDvel/rime-ice
      * Chewing - 新酷音
      * opencc - 開放中文轉換
  dependencies:
    - radical_pinyin # from rime radical pinyin project
    - melt_eng # english schema



switches:
  - name: ascii_mode
    reset: 0
    states: [ 中文, 英文 ]
  - name: emoji_suggestion
    states: [ "😣️","😁️"]
    reset: 1
  - name: full_shape
    states: [ 半角, 全角 ]
    reset: 0
  - name: tone_display                  # live tone preedit handled by super_preedit lua
    states: [ 声杳, 声起 ]
    reset: 0
  - name: transcription
    states: [ 简体 , 繁体 ]
    reset: 0
  - name: ascii_punct
    states: [ "。，" , "．，" ]
    reset: 0

engine:
  processors:
    - lua_processor@*select_character              # select character from word
    - lua_processor@*codeLengthLimit_processor     # limit max input length to avoid lag
    - ascii_composer                               # handle ascii mode switching
    - recognizer                                   # work with matcher for patterned input like urls and reverse lookup
    - key_binder                                   # rebind keys such as comma and period for paging
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor                                    # mark ascii segment
    - matcher                                            # mark patterned segments like urls and reverse lookup
    - affix_segmentor@radical_reverse_lookup
    - affix_segmentor@unicode
    - abc_segmentor                                      # mark regular text segment
    - punct_segmentor                                    # mark punctuation segment
    - fallback_segmentor                                 # mark remaining segments
  translators:
    - punct_translator                                   # convert punctuation
    - script_translator
    - lua_translator@*unicode_translator                # unicode candidates
    - lua_translator@*shijian                            # time date weekday month greeting solar terms festivals and N mode
    - lua_translator@*number_translator                  # chinese uppercase money numbers
    - lua_translator@*chineseLunarCalendar_translator    # lunar calendar
    - lua_translator@*mint_calculator_translator         # calculator with lua expressions
    - table_translator@melt_eng                          # english as sub translator with lower priority
    - table_translator@cn_en                             # mixed chinese english phrases
    - reverse_lookup_translator@radical_reverse_lookup
    - lua_translator@*force_gc                           # force gc to reduce long run lag
    # - reverse_lookup_translator # removed for multi tag setup
    # - echo_translator # echo input when no candidates
  filters:
    - lua_filter@*corrector_filter            # wrong pronunciation hints
    - lua_filter@*super_preedit               # add tones to preedit
    - lua_filter@*autocap_filter              # english auto capitalize
    - simplifier@emoji_suggestion
    - simplifier@transcription_cc
    - lua_filter@*reduce_english_filter       # lower some english words
    - uniquifier                              # deduplicate

# shijian codes are fixed prefix key editable in key_binder
# time osj or /sj
# date orq or /rq
# lunar onl or /nl
# weekday oxq or /xq
# week of year oww or /ww
# solar term ojq or /jq
# datetime odt or /dt
# timestamp ott or /tt
# capital N date N20250315 or N0312 without year
# festival ojr or /jr
# greeting template /day or oday
# generic datetime formatter reused by rq sj dt and N codes
# escapes
#   backslash X outputs the character literally
#   double bracket block outputs literally
#
# placeholders
# date placeholders
#   Y four digit year
#   y two digit year
#   m month zero padded
#   n month no leading zero
#   d day zero padded
#   j day no leading zero
#
# time placeholders
#   H hour 24 zero padded
#   G hour 24 no leading zero
#   I hour 12 zero padded
#   l hour 12 lowercase L
#   M minute zero padded
#   S second zero padded
#   p am pm lowercase
#   P AM PM uppercase
# timezone placeholders
#   O offset with colon
#   o offset without colon
#   A chinese day period
date_formats:
  - "Y年m月d日"
  - "Y-m-d"
  - "Y/m/d"
  - "Y.m.d"
  - "Ymd"
  - "Y年n月j日"
  - "y年n月j日"
  - "n月j日"
time_formats:
  - "H:M"
  - "H点M分"
  - "H:M:S"
  - "H时M分S秒"
  - "AI:M"
  - "I:M P"
datetime_formats:
  - "Y-m-d H:M:S"
  - "Y-m-dTH:M:S O"
  - "YmdHMS"
  - "Y年m月d日 H点M分"
  - "y/m/d I:M p"

# simplified traditional conversion
transcription_cc:
  option_name: transcription
  opencc_config: s2t.json             # s2t.json or s2hk.json or s2tw.json or s2twp.json
  tips: none                          # tips all or char or none
  excluded_types: [ reverse_lookup ]  # skip reverse lookup content

# emoji module
emoji_suggestion:
  opencc_config: emoji.json
  option_name: emoji_suggestion
  tips: all
  inherit_comment: false

# max input length
codeLengthLimit_processor: 25


# lua config lower some english words
# see dvel blog make rime en better
# normally rug ranks first
# after lowering rug ranks second
# modes
# all use builtin list
# none disable this lua
# custom lower only words below
# unset use global settings
# matches codes not words
reduce_english_filter:
  mode: all  # all or none or custom or unset
  idx: 2        # lower to position idx
  # custom list common words are not lowered
  words: [aid, ann,
  bail, bait, bam, band, bans, bat, bay, bend, bent, benz, bib, bid, bien, biz, boc, bop, bos, bud, buf,
  cab, cad, cain, cam, cans, cap, cas, cef, chad, chan, chap, chef, cher, chew, chic, chin, chip, chit, coup, cum, cunt, cur,
  dab, dag, dal, dam, dent, dew, dial, diet, dim, din, dip, dis, dit, doug, dub, dug, dunn,
  fab, fax, fob, fog, foul, fur,
  gag, gail, gain, gal, gam, gaol, ged, gel, ger, guam, gus, gut,
  hail, ham, hank, hans, hat, hay, heil, heir, hem, hep, hud, hum, hung, hunk, hut,
  jim, jug,
  kat,
  lab, lad, lag, laid, lam, laos, lap, lat, lax, lay, led, leg, lex, liam, lib, lid, lied, lien, lies, linn, lip, lit, liz, lob, lug, lund, lung, lux,
  mag, maid, mann, mar, mat, med, mel, mend, mens, ment, mil, mins, mint, mob, moc, mop, mos, mot, mud, mug, mum, nail,
  nap, nat, nay, neil, nib, nip, noun, nous, nun, nut,
  pac, paid, pail, pain, pair, pak, pal, pam, pans, pant, pap, par, pat, paw, pax, pens, pic, pier, pies, pins, pint, pit, pix, pod, pop, pos, pot, pour, pow, pub,
  rand, rant, rent, rep, res, ret, rex, rib, rid, rig, rim, rub, rug, rum, runc, runs,
  sac, sail, sal, sam, sans, sap, saw, sax, sew, sham, shaw, shin, sig, sin, sip, sis, suit, sung, suns, sup, sur, sus,
  tad, tail, taj, tar, tax, tec, ted, tel, ter, tex, tic, tied, tier, ties, tim, tin, tit, tour, tout, tum,
  wag, wand, womens, wap, wax, weir, won,
  yan, yen]

  
# lunar calendar config
chineseLunarCalendar_translator: lunar

translator:
  # enable_correction: true enables builtin key correction for mobile 26 key
  # dictionary
  dictionary: rime_mint          # main dictionary
  prism: rime_mint_flypy     # separate prism name when schemas share a dictionary
  spelling_hints: 8              # show pinyin in comment for corrector lua
  always_show_comments: true     # always show comments for corrector lua
  comment_format: {comment}      # expose comment string for super_preedit lua
  preedit_format:
    - xform/([nl])v/$1ü/
    - xform/([nl])ue/$1üe/
    - xform/([jqxy])v/$1u/
  initial_quality: 1.2
  enable_user_dict: true         # enable user dict frequency

melt_eng:
  dictionary: melt_eng           # english dictionary
  enable_sentence: false         # disable auto sentence
  enable_completion: false       # disable auto completion
  initial_quality: 0.8
  
# mixed chinese english phrases
cn_en:
  dictionary: ""                 # use phrase dict leave normal dict empty
  user_dict: dicts/rime_ice.cn_en_flypy
  db_class: stabledb
  enable_completion: false
  enable_sentence: false
  initial_quality: 0.5
  comment_format:
    - xform/^.+$//

speller:
  # uppercase letters enable mixed english dict
  alphabet: zyxwvutsrqponmlkjihgfedcbaZYXWVUTSRQPONMLKJIHGFEDCBA
  # space is default separator backtick splits syllables manually
  delimiter: " `"
  # spelling algebra
  algebra:
    - xlit/āáǎàōóǒòēéěèīíǐìūúǔùǖǘǚǜü/aaaaooooeeeeiiiiuuuuvvvvv/  # wanxiang dict start
    - xform/^ng$/eng/
    - xform/ńg|ňg|ǹg/eng/
    - xform/ń|ň|ǹ/en/                                            # wanxiang dict end
    - erase/^xx$/ # keep top choice
    - derive/([aeiou])ng$/$1gn/        # dagn to dang
    - derive/([dtngkhrzcs])o(u|ng)$/$1o/  # zho to zhong or zhou
    - derive/ong$/on/                  # zhonguo to zhong guo
    - abbrev/^([a-z])[a-z]*$/$1/       # initial abbreviation
    - abbrev/^([zcs]h).+$/$1/          # abbreviation for zh ch sh
     # auto correction
    # some rules affect mixed abbreviation input
    # zh、ch、sh
    - derive/([zcs])h(a|e|i|u|ai|ei|an|en|ou|uo|ua|un|ui|uan|uai|uang|ang|eng|ong)$/h$1$2/  # hzi to zhi
    - derive/([zcs])h([aeiu])$/$1$2h/  # zih to zhi
    # ai
    - derive/^([wghk])ai$/$1ia/  # wia to wai
    # ia
    - derive/([qjx])ia$/$1ai/  # qai to qia
    # ei
    - derive/([wtfghkz])ei$/$1ie/
    # ie
    - derive/([jqx])ie$/$1ei/
    # ao
    - derive/([rtypsdghklzcbnm])ao$/$1oa/
    # ou
    - derive/([ypfm])ou$/$1uo/
    # uo none
    # an
    - derive/([wrtypsdfghklzcbnm])an$/$1na/
    # en
    - derive/([wrpsdfghklzcbnm])en$/$1ne/
    # ang
    - derive/([wrtypsdfghklzcbnm])ang$/$1nag/
    - derive/([wrtypsdfghklzcbnm])ang$/$1agn/
    # eng
    - derive/([wrtpsdfghklzcbnm])eng$/$1neg/
    - derive/([wrtpsdfghklzcbnm])eng$/$1egn/
    # ing
    - derive/([qtypdjlxbnm])ing$/$1nig/
    - derive/([qtypdjlxbnm])ing$/$1ign/
    # ong
    - derive/([rtysdghklzcn])ong$/$1nog/
    - derive/([rtysdghklzcn])ong$/$1ogn/
    # iao
    - derive/([qtpdjlxbnm])iao$/$1ioa/
    - derive/([qtpdjlxbnm])iao$/$1oia/
    # ui
