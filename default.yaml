# Rime default settings
# encoding: utf-8

# note mint keeps a redundant default.yaml to stay compatible with rimetool
# prefer editing schema files over default.custom.yaml for page_size and key_binder
# see mintimate docs on configuration override

# Fork From: https://github.com/rime/librime/blob/3bc65c990546aa2062ecd1eb593d54d2949644cd/data/minimal/default.yaml
config_version: "24.03.24"

# values below are overridden by default.custom.yaml and schema configs
## t9 depends on rime_mint use a custom file to override for other schemas
schema_list:
  - schema: rime_mint            # mint full pinyin
  - schema: double_pinyin_flypy  # flypy double pinyin
  - schema: rime_mint_flypy      # mint full pinyin flypy hybrid
  - schema: terra_pinyin         # terra pinyin mint custom
  - schema: wubi98_mint          # wubi98
  - schema: wubi86_jidian        # wubi86 jidian
  - schema: t9                   # t9 nine key full pinyin
  # schemas below are adapted but not active
  # - schema: double_pinyin_abc    # abc double pinyin
  # - schema: double_pinyin_mspy   # microsoft double pinyin
  # - schema: double_pinyin_sogou  # sogou double pinyin
  # - schema: double_pinyin_ziguang # ziguang double pinyin
  # - schema: double_pinyin         # natural code double pinyin

switcher:
  # caption shown when switching schemas
  caption: 〔方案切换〕
  # hotkeys for schema switching
  hotkeys:
    - Control+grave
    - Control+Shift+grave
    # F4 conflicts with jetbrains hotkeys
    # - F4
  # options kept when switching schemas
  save_options:
    - full_shape  # keep full shape mode
    - ascii_punct # keep ascii punctuation mode
    - transcription     # keep simplified traditional option
    - emoji_suggestion  # Emoji
  # fold options to save space fold for many schemas expand for one
  fold_options: true
  # abbreviate options
  abbreviate_options: true
  # separator between options
  option_list_separator: '／'

menu:
  # candidate count
  page_size: 6

translator:
  # enable auto phrase encoding
  enable_encoder: true
  # enable auto sentence
  enable_sentence: true
  # enable user dict
  enable_user_dict: true
  # encode committed history to improve next hits
  encode_commit_history: true

punctuator:
  full_shape:
    ' ' : { commit: '　' }
    ',' : { commit: ， }
    '.' : { commit: 。 }
    '<' : [ 《, 〈, «, ‹ ]
    '>' : [ 》, 〉, », › ]
    '/' : [ ／, ÷ ]
    '?' : { commit: ？ }
    ';' : { commit: ； }
    ':' : { commit: ： }
    '''' : { pair: [ '‘', '’' ] }
    '"' : { pair: [ '“', '”' ] }
    '\' : [ 、, ＼ ]
    '|' : [ ・, ｜, '§', '¦' ]
    '`' : ｀
    '~' : [ 〜, ～, 〰 ]
    '!' : { commit: ！ }
    '@' : [ ＠, ☯ ]
    '#' : [ ＃, ⌘ ]
    '%' : [ ％, '°', '℃' ]
    '$' : [ ￥, '$', '€', '£', '¥', '¢', '¤' ]
    '^' : { commit: …… }
    '&' : ＆
    '*' : [ ＊, ・, ·, ×, ※, ❂ ]
    '(' : （
    ')' : ）
    '-' : －
    '_' : ——
    '+' : ＋
    '=' : ＝
    '[' : [ 「, 【, 〔, ［ ]
    ']' : [ 」, 】, 〕, ］ ]
    '{' : [ 『, 〖, ｛ ]
    '}' : [ 』, 〗, ｝ ]
  half_shape:
    ',' : { commit: ， }
    '.' : { commit: 。 }
    '<' : [ 《, 〈, «, ‹ ]
    '>' : [ 》, 〉, », › ]
    '/' : [ 、, '/', ／, ÷ ]
    '?' : { commit: ？ }
    ';' : { commit: ； }
    ':' : { commit: ： }
    '''' : { pair: [ '‘', '’' ] }
    '"' : { pair: [ '“', '”' ] }
    '\' : [ 、, '\', ＼ ]
    '|' : [ ・, '|', ｜, '§', '¦' ]
    '`' : '`'
    '~' : [ '~', 〜, ～, 〰 ]
    '!' : { commit: ！ }
    '@' : '@'
    '#' : '#'
    '%' : [ '%', ％, '°', '℃' ]
    '$' : [ ￥, '$', '€', '£', '¥', '¢', '¤' ]
    '^' : { commit: …… }
    '&' : '&'
    '*' : [ '*', ＊, ・, ·, ×, ※, ❂ ]
    '(' : （
    ')' : ）
    '-' : '-'
    '_' : ——
    '+' : '+'
    '=' : '='
    '[' : [ 「, 【, 〔, ［ ]
    ']' : [ 」, 】, 〕,  ］ ]
    '{' : [ 『, 〖, ｛ ]
    '}' : [ 』, 〗, ｝ ]

key_binder:
  bindings:
    # emacs style bindings
    - { when: composing, accept: Control+p, send: Up }     # Control+p acts as Up while composing
    - { when: composing, accept: Control+n, send: Down }
    - { when: composing, accept: Control+b, send: Left }
    - { when: composing, accept: Control+f, send: Right }
    - { when: composing, accept: Control+a, send: Home }
    - { when: composing, accept: Control+e, send: End }
    - { when: composing, accept: Control+d, send: Delete }
    - { when: composing, accept: Control+k, send: Shift+Delete } # delete to line end
    - { when: composing, accept: Control+g, send: Escape }       # exit composing
    - { when: composing, accept: Alt+v, send: Page_Up }          # paging
    - { when: composing, accept: Control+v, send: Page_Down }
    # move cursor by word
    - { when: composing, accept: ISO_Left_Tab, send: Shift+Left } # ISO_Left_Tab is Shift+Tab
    - { when: composing, accept: Shift+Tab, send: Shift+Left }
    - { when: composing, accept: Tab, send: Shift+Right }
    # paging
    - { when: paging, accept: minus, send: Page_Up }             # minus pages up not on first page
    - { when: has_menu, accept: equal, send: Page_Down }         # equal pages down
    - { when: paging, accept: comma, send: Page_Up }             # candidate window paging
    - { when: has_menu, accept: period, send: Page_Down }
    - { when: predicting, accept: comma, send: comma }           # not a hotkey while predicting
    - { when: predicting, accept: period, send: period }
    # toggle states
    - { when: always, accept: Control+Shift+1, select: .next }   # switch schema
    - { when: always, accept: Control+Shift+2, toggle: ascii_mode } # toggle chinese english
    - { when: always, accept: Control+Shift+3, toggle: full_shape } # toggle full half shape
    - { when: always, accept: Control+Shift+4, toggle: transcription } # toggle simplified traditional
    - { when: always, accept: Control+Shift+5, toggle: extended_charset } # toggle extended charset
    - { when: always, accept: Shift+space, toggle: full_shape } # another full half shape toggle
    - { when: always, accept: Control+period, toggle: ascii_punct } # toggle chinese english punctuation
    # map numpad digits and dot to main keys so money lua like R1234.5678 works
    - {accept: KP_0, send: 0, when: composing}
    - {accept: KP_1, send: 1, when: composing}
    - {accept: KP_2, send: 2, when: composing}
    - {accept: KP_3, send: 3, when: composing}
    - {accept: KP_4, send: 4, when: composing}
    - {accept: KP_5, send: 5, when: composing}
    - {accept: KP_6, send: 6, when: composing}
    - {accept: KP_7, send: 7, when: composing}
    - {accept: KP_8, send: 8, when: composing}
    - {accept: KP_9, send: 9, when: composing}
    - {accept: KP_Decimal, send: period, when: composing}
    # map numpad operators to main keys so calculator like 1+2-3*4 works
    - {accept: KP_Multiply, send: asterisk, when: composing}
    - {accept: KP_Add,      send: plus,     when: composing}
    - {accept: KP_Subtract, send: minus,    when: composing}
    - {accept: KP_Divide,   send: slash,    when: composing}
    # map numpad enter to main enter
    - {accept: KP_Enter,    send: Return,   when: composing}

recognizer:
  # recognizer regex patterns
  patterns:
    email: "^[a-z][-_.0-9a-z]*@.*$"  # match email addresses
    uppercase: "[A-Z][-_+.'0-9A-Za-z]*$"  # match strings starting with uppercase
    url: "^(www[.]|https?:|ftp:|mailto:).*$|^[a-z]+[.].+$"  # match urls or domains

ascii_composer:
  # keys switching to ascii mode
  switch_key:
    Caps_Lock: commit_code  # Caps_Lock commits code directly
    Control_L: noop  # left Control does nothing
    Control_R: noop  # right Control does nothing
    Shift_L: commit_code  # left Shift commits code directly
    Shift_R: inline_ascii  # right Shift enters temporary ascii mode
  good_old_caps_lock: true  # classic Caps_Lock ascii behavior
