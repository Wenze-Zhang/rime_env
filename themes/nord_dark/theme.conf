# vim: ft=dosini
[Metadata]
Name=Nord-Dark
Version=0.1
Author=tonyfettes
Description=Nord Color Theme (Dark)
ScaleWithDPI=True

[InputPanel]
# font
Font=Sans 13
# normal candidate color
NormalColor=#81a1c1
# highlighted candidate color
HighlightCandidateColor=#88c0d0
# preedit text color
HighlightColor=#88c0d0
# preedit background color
HighlightBackgroundColor=#434c5e
# 
Spacing=3

[InputPanel/TextMargin]
# candidate left margin
Left=10
# candidate right margin
Right=10
# candidate top margin
Top=6
# candidate bottom margin
Bottom=6

[InputPanel/Background]
Color=#434c5e

[InputPanel/Background/Margin]
Left=2
Right=2
Top=2
Bottom=2

[InputPanel/Highlight]
Color=#4c566a

[InputPanel/Highlight/Margin]
# highlight left margin
Left=10
# highlight right margin
Right=10
# highlight top margin
Top=7
# highlight bottom margin
Bottom=7

[Menu]
Font=Sans 10
NormalColor=#eceff4
#HighlightColor=#4c566a
Spacing=3

[Menu/Background]
Color=#434c5e

[Menu/Background/Margin]
Left=2
Right=2
Top=2
Bottom=2

[Menu/ContentMargin]
Left=2
Right=2
Top=2
Bottom=2

[Menu/Highlight]
Color=#4c566a

[Menu/Highlight/Margin]
Left=10
Right=10
Top=5
Bottom=5

[Menu/Separator]
Color=#2e3440

[Menu/CheckBox]
Image=radio.png

[Menu/SubMenu]
Image=arrow.png

[Menu/TextMargin]
Left=5
Right=5
Top=5
Bottom=5
