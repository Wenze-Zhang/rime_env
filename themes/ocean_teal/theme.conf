# vim: ft=dosini
# 自制主题：蓝绿色，配色参考 VS Code "Material Theme Ocean"
# radio.png / arrow.png 复用自 tonyfettes/fcitx5-nord（白色中性图标）
[Metadata]
Name=Ocean Teal
Version=1.0
Author=wenze zhang
Description=Teal accents on deep ocean blue, inspired by VS Code Material Theme Ocean
ScaleWithDPI=True

[InputPanel]
Font=Sans 13
Spacing=3
# 普通候选词文字（Material 前景灰蓝）
NormalColor=#a6accd
# 选中候选词文字（深底色，压在青绿高亮块上）
HighlightCandidateColor=#0f111a
# 输入编码文字（青色）
HighlightColor=#89ddff
# 输入编码背景（与面板同色）
HighlightBackgroundColor=#1b1e2b

[InputPanel/TextMargin]
Left=18
Right=18
Top=8
Bottom=8

[InputPanel/Background]
Color=#1b1e2b
# 圆角面板（不要圆角就注释掉这行）
Image=panel.svg

[InputPanel/Background/Margin]
Left=10
Right=10
Top=10
Bottom=10

[InputPanel/Highlight]
# 青绿高亮（Material teal）
Color=#80cbc4
# 圆角高亮块
Image=highlight.svg

[InputPanel/Highlight/Margin]
Left=18
Right=18
Top=8
Bottom=8

[Menu]
Font=Sans 10
NormalColor=#a6accd
Spacing=3

[Menu/Background]
Color=#1b1e2b

[Menu/Background/Margin]
Left=2
Right=2
Top=2
Bottom=2

[Menu/ContentMargin]
Left=2
Right=2
Top=2
Bottom=2

[Menu/Highlight]
Color=#80cbc4

[Menu/Highlight/Margin]
Left=10
Right=10
Top=5
Bottom=5

[Menu/Separator]
Color=#0f111a

[Menu/CheckBox]
Image=radio.png

[Menu/SubMenu]
Image=arrow.png

[Menu/TextMargin]
Left=5
Right=5
Top=5
Bottom=5
