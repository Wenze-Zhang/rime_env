# vim: ft=dosini
# custom teal theme inspired by vscode material theme ocean
# radio and arrow icons reused from tonyfettes fcitx5-nord
[Metadata]
Name=Ocean Teal
Version=1.0
Author=wenze zhang
Description=Teal accents on deep ocean blue, inspired by VS Code Material Theme Ocean
ScaleWithDPI=True

[InputPanel]
Font=Sans 13
Spacing=3
# normal candidate text
NormalColor=#a6accd
# highlighted candidate text
HighlightCandidateColor=#0f111a
# preedit code text
HighlightColor=#89ddff
# preedit code background
HighlightBackgroundColor=#1b1e2b

[InputPanel/TextMargin]
Left=18
Right=18
Top=8
Bottom=8

[InputPanel/Background]
Color=#1b1e2b
# rounded panel comment out to disable
Image=panel.svg

[InputPanel/Background/Margin]
Left=10
Right=10
Top=10
Bottom=10

[InputPanel/Highlight]
# teal highlight
Color=#80cbc4
# rounded highlight
Image=highlight.svg

[InputPanel/Highlight/Margin]
Left=18
Right=18
Top=8
Bottom=8

[Menu]
Font=Sans 10
NormalColor=#a6accd
Spacing=3

[Menu/Background]
Color=#1b1e2b

[Menu/Background/Margin]
Left=2
Right=2
Top=2
Bottom=2

[Menu/ContentMargin]
Left=2
Right=2
Top=2
Bottom=2

[Menu/Highlight]
Color=#80cbc4

[Menu/Highlight/Margin]
Left=10
Right=10
Top=5
Bottom=5

[Menu/Separator]
Color=#0f111a

[Menu/CheckBox]
Image=radio.png

[Menu/SubMenu]
Image=arrow.png

[Menu/TextMargin]
Left=5
Right=5
Top=5
Bottom=5
