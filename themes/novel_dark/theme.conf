# vim: ft=dosini
# custom warm yellow dark theme inspired by vscode gruvbox dark
# radio and arrow icons reused from tonyfettes fcitx5-nord
[Metadata]
Name=Novel Dark
Version=1.0
Author=wenze zhang
Description=Warm cream-yellow on dark brown, inspired by VS Code Gruvbox Dark
ScaleWithDPI=True

[InputPanel]
Font=Sans 13
Spacing=3
# normal candidate text
NormalColor=#ebdbb2
# highlighted candidate text
HighlightCandidateColor=#282828
# preedit code text
HighlightColor=#fe8019
# preedit code background
HighlightBackgroundColor=#32302f

[InputPanel/TextMargin]
Left=18
Right=18
Top=8
Bottom=8

[InputPanel/Background]
Color=#32302f
# rounded panel comment out to disable
Image=panel.svg

[InputPanel/Background/Margin]
Left=10
Right=10
Top=10
Bottom=10

[InputPanel/Highlight]
# warm yellow highlight
Color=#fabd2f
# rounded highlight
Image=highlight.svg

[InputPanel/Highlight/Margin]
Left=18
Right=18
Top=8
Bottom=8

[Menu]
Font=Sans 10
NormalColor=#ebdbb2
Spacing=3

[Menu/Background]
Color=#32302f

[Menu/Background/Margin]
Left=2
Right=2
Top=2
Bottom=2

[Menu/ContentMargin]
Left=2
Right=2
Top=2
Bottom=2

[Menu/Highlight]
Color=#d79921

[Menu/Highlight/Margin]
Left=10
Right=10
Top=5
Bottom=5

[Menu/Separator]
Color=#1d2021

[Menu/CheckBox]
Image=radio.png

[Menu/SubMenu]
Image=arrow.png

[Menu/TextMargin]
Left=5
Right=5
Top=5
Bottom=5
