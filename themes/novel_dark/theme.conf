# vim: ft=dosini
# 自制主题：暖黄色深色（novel 阅读感），配色参考 VS Code "Gruvbox Dark"
# radio.png / arrow.png 复用自 tonyfettes/fcitx5-nord（白色中性图标）
[Metadata]
Name=Novel Dark
Version=1.0
Author=wenze zhang
Description=Warm cream-yellow on dark brown, inspired by VS Code Gruvbox Dark
ScaleWithDPI=True

[InputPanel]
Font=Sans 13
Spacing=3
# 普通候选词文字（Gruvbox 奶油色前景）
NormalColor=#ebdbb2
# 选中候选词文字（深底色，压在暖黄高亮块上）
HighlightCandidateColor=#282828
# 输入编码文字（暖橙）
HighlightColor=#fe8019
# 输入编码背景（与面板同色）
HighlightBackgroundColor=#32302f

[InputPanel/TextMargin]
Left=18
Right=18
Top=8
Bottom=8

[InputPanel/Background]
Color=#32302f
# 圆角面板（不要圆角就注释掉这行）
Image=panel.svg

[InputPanel/Background/Margin]
Left=10
Right=10
Top=10
Bottom=10

[InputPanel/Highlight]
# 暖黄高亮（Gruvbox yellow）
Color=#fabd2f
# 圆角高亮块
Image=highlight.svg

[InputPanel/Highlight/Margin]
Left=18
Right=18
Top=8
Bottom=8

[Menu]
Font=Sans 10
NormalColor=#ebdbb2
Spacing=3

[Menu/Background]
Color=#32302f

[Menu/Background/Margin]
Left=2
Right=2
Top=2
Bottom=2

[Menu/ContentMargin]
Left=2
Right=2
Top=2
Bottom=2

[Menu/Highlight]
Color=#d79921

[Menu/Highlight/Margin]
Left=10
Right=10
Top=5
Bottom=5

[Menu/Separator]
Color=#1d2021

[Menu/CheckBox]
Image=radio.png

[Menu/SubMenu]
Image=arrow.png

[Menu/TextMargin]
Left=5
Right=5
Top=5
Bottom=5
